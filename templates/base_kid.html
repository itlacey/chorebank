{% extends "base.html" %}
{% load core_tags %}

{% block header_right %}
<li class="nav-item">
    <span class="nav-link"
          hx-get="{% url 'balance_badge' %}"
          hx-trigger="chore-completed from:body"
          hx-swap="innerHTML">
        {% bank_balance request.user %}
    </span>
</li>
{% endblock %}

{% block sidebar_nav %}
<li class="nav-item">
    <a href="{% url 'kid_home' %}" class="nav-link {% block nav_home_active %}{% endblock %}">
        <i class="nav-icon bi bi-house"></i>
        <p>Home</p>
    </a>
</li>
<li class="nav-item">
    <a href="{% url 'kid_chore_list' %}" class="nav-link {% block nav_chores_active %}{% endblock %}">
        <i class="nav-icon bi bi-check2-square"></i>
        <p>My Chores</p>
    </a>
</li>
<li class="nav-item">
    <a href="/kid/timer/" class="nav-link {% block nav_timer_active %}{% endblock %}">
        <i class="nav-icon bi bi-stopwatch"></i>
        <p>Timer</p>
    </a>
</li>
<li class="nav-item">
    <a href="{% url 'timer_history' %}" class="nav-link {% block nav_history_active %}{% endblock %}">
        <i class="nav-icon bi bi-clock-history"></i>
        <p>History</p>
    </a>
</li>
<li class="nav-item">
    <a href="{% url 'kid_settings' %}" class="nav-link {% block nav_settings_active %}{% endblock %}">
        <i class="nav-icon bi bi-gear"></i>
        <p>Settings</p>
    </a>
</li>
{% endblock %}
